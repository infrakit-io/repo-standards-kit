name: Go CI (Reusable)

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version override (leave empty to use go.mod)'
        required: false
        type: string
        default: ''
      coverage-badge:
        description: 'Generate and commit coverage badge JSON to docs/coverage/coverage.json'
        required: false
        type: boolean
        default: false
      coverage-exclude-pattern:
        description: 'grep -v pattern to exclude packages from coverage (e.g., /examples\|/scripts\|/mocks\|/cmd)'
        required: false
        type: string
        default: ''
      security-checks:
        description: 'Run make security-check and make decision-contract-check before tests'
        required: false
        type: boolean
        default: false
      golangci-lint-version:
        description: 'golangci-lint version'
        required: false
        type: string
        default: 'v2.10.1'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Security policy checks
        if: ${{ inputs.security-checks }}
        run: make security-check
      - name: Decision contract checks
        if: ${{ inputs.security-checks }}
        run: make decision-contract-check
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: go.mod
      - run: go test ./...
      - run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ inputs.golangci-lint-version }}

  vulncheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...

  coverage:
    if: ${{ inputs.coverage-badge && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: go.mod
      - name: Generate coverage badge JSON
        run: |
          mkdir -p tmp docs/coverage
          if [ -n "${{ inputs.coverage-exclude-pattern }}" ]; then
            PKGS=$(go list ./... | grep -v '${{ inputs.coverage-exclude-pattern }}')
            go test -coverprofile=tmp/coverage.out $PKGS
          else
            go test -coverprofile=tmp/coverage.out ./...
          fi
          total=$(go tool cover -func=tmp/coverage.out | tail -1 | awk '{print $3}')
          pct=${total%%%}
          color=red
          awk "BEGIN {exit !($pct >= 80)}" && color=green
          awk "BEGIN {exit !($pct >= 60 && $pct < 80)}" && color=yellow
          cat > docs/coverage/coverage.json <<EOF
          {"schemaVersion":1,"label":"coverage","message":"${total}","color":"${color}"}
          EOF
      - name: Commit coverage badge JSON
        run: |
          if git diff --quiet -- docs/coverage/coverage.json; then
            echo "No coverage change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/coverage/coverage.json
          git commit -m "chore: update coverage badge"
          git push
