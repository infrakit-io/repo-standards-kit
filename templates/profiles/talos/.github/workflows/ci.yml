name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  ci:
    uses: infrakit-io/repo-standards-kit/.github/workflows/go-ci.yml@v1
    permissions:
      contents: write

  core-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Core coverage gate
        run: make test-cover

  coverage:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Generate coverage badges
        run: go run ./tools/buildctl coverage-badges --repo-root .
      - name: Commit coverage badges
        run: |
          if git diff --quiet -- docs/coverage/coverage.json docs/coverage/coverage-all.json docs/coverage/coverage-core.json; then
            echo "No coverage change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/coverage/coverage.json docs/coverage/coverage-all.json docs/coverage/coverage-core.json
          git commit -m "chore: update coverage badge"
          git push
